name: Beatly CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    services:
      mongodb:
        image: mongo:6
        ports:
          - 27017:27017
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v3
    - name: Use Node.js 20
      uses: actions/setup-node@v3
      with:
        node-version: 20
        cache: 'npm'
        cache-dependency-path: './backend/package-lock.json'
    - run: npm ci
    - run: npm test
      env:
        NODE_ENV: test
        MONGODB_URI: mongodb://localhost:27017/beatly_test
        CACHE_DRIVER: memory
        SESSION_SECRET: ci-test-session-secret
        FRONTEND_URL: http://localhost:5173
        SPOTIFY_CLIENT_ID: ci-test-client-id
        SPOTIFY_CLIENT_SECRET: ci-test-client-secret

  frontend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
    - uses: actions/checkout@v3
    - name: Use Node.js 20
      uses: actions/setup-node@v3
      with:
        node-version: 20
        cache: 'npm'
        cache-dependency-path: './frontend/package-lock.json'
    - run: npm ci
    - run: npm run lint
    - run: npm test
    - run: npm run build
