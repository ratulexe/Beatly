version: '3.8'

services:
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongo:27017/beatly
      - SESSION_SECRET=${SESSION_SECRET:-fallback_secret}
      - CLIENT_URL=http://localhost:80
      - SPOTIFY_CLIENT_ID=${SPOTIFY_CLIENT_ID}
      - SPOTIFY_CLIENT_SECRET=${SPOTIFY_CLIENT_SECRET}
      - SPOTIFY_REDIRECT_URI=http://localhost:5000/api/auth/callback
      - FRONTEND_URL=http://localhost:80
      - CACHE_DRIVER=redis
      - REDIS_URL=redis://redis:6379
    depends_on:
      - mongo
      - redis
    networks:
      - beatly-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    environment:
      - VITE_API_URL=http://localhost:5000
    depends_on:
      - backend
    networks:
      - beatly-network

  mongo:
    image: mongo:6
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - beatly-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - beatly-network

volumes:
  mongo-data:

networks:
  beatly-network:
    driver: bridge
